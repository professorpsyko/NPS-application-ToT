<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Thank You — Teachers of Tomorrow</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #eef0f3;
      font-family: Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: #fff;
      border-radius: 8px;
      padding: 48px 40px;
      max-width: 480px;
      width: 90%;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,.08);
    }
    h1 { color: #2c3e6b; font-size: 22px; margin-bottom: 16px; }
    p  { color: #5a6a7a; font-size: 15px; line-height: 1.6; margin-bottom: 24px; }
    .cta {
      display: inline-block;
      background: #00b67a;
      color: #fff;
      padding: 12px 28px;
      border-radius: 4px;
      text-decoration: none;
      font-size: 15px;
      font-weight: 600;
    }
    .cta:hover { background: #009e6a; }
    .countdown { color: #8896a8; font-size: 13px; margin-top: 16px; }
  </style>
</head>
<body>
<div class="card">
  <h1>Thank you for your feedback!</h1>
  <p>
    We're so glad you've had a great experience with Teachers of Tomorrow.<br><br>
    If you'd like to share your experience publicly, we'd genuinely appreciate
    a review — it helps other educators find us.
  </p>
  <a id="trustpilot-btn" class="cta" href="__TRUSTPILOT_URL__">
    Leave a review on Trustpilot
  </a>
  <p class="countdown" id="countdown">
    Redirecting in <span id="seconds">3</span> seconds&hellip;
  </p>
</div>

<script>
  // Page works without JS — the link above is always clickable.
  // JS adds the auto-redirect countdown for convenience.
  (function () {
    var TRUSTPILOT = '__TRUSTPILOT_URL__';
    var s  = 3;
    var el = document.getElementById('seconds');
    var timer = setInterval(function () {
      s--;
      el.textContent = s;
      if (s <= 0) {
        clearInterval(timer);
        window.location.href = TRUSTPILOT;
      }
    }, 1000);
  }());
</script>
</body>
</html>
