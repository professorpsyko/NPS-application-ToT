<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Thank You — Teachers of Tomorrow</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #eef0f3;
      font-family: Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: #fff;
      border-radius: 8px;
      padding: 48px 40px;
      max-width: 480px;
      width: 90%;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,.08);
    }
    h1 { color: #2c3e6b; font-size: 22px; margin-bottom: 16px; }
    p  { color: #5a6a7a; font-size: 15px; line-height: 1.6; }
  </style>
</head>
<body>
<div class="card">
  <h1>Thank you for your feedback!</h1>
  <p>
    Your response has been recorded. We appreciate you taking the time
    to share your experience — it helps us improve.
  </p>
</div>
</body>
</html>
