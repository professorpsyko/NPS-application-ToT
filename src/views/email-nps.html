<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Your opinion matters</title>
</head>
<body style="margin:0;padding:0;background:#eef0f3;font-family:Arial,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background:#eef0f3;padding:40px 0;">
    <tr>
      <td align="center">
        <table width="520" cellpadding="0" cellspacing="0"
               style="background:#ffffff;border-radius:6px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.08);">

          <tr>
            <td style="background:__ACCENT__;height:6px;font-size:0;line-height:0;">&nbsp;</td>
          </tr>

          <tr>
            <td align="center" style="padding:32px 40px 8px;">
              <img src="__LOGO_URL__"
                   alt="__BRAND_NAME__"
                   width="__LOGO_WIDTH__"
                   style="display:block;border:0;max-width:__LOGO_WIDTH__px;">
            </td>
          </tr>

          <tr>
            <td align="center" style="padding:8px 40px 28px;">
              <h1 style="margin:0;font-size:22px;font-weight:700;color:__ACCENT__;">
                __GREETING__ opinion matters
              </h1>
            </td>
          </tr>

          <tr>
            <td align="center" style="padding:0 40px 24px;">
              <p style="margin:0;font-size:15px;font-weight:700;color:__ACCENT__;
                        line-height:1.5;text-align:center;">
                How likely is it that you would recommend<br>
                __BRAND_NAME__ to a friend or colleague?
              </p>
            </td>
          </tr>

          <tr>
            <td align="center" style="padding:0 40px 8px;">
              <table cellpadding="0" cellspacing="0">
                <tr>__SCORE_LINKS__</tr>
              </table>
            </td>
          </tr>

          <tr>
            <td style="padding:4px 48px 36px;">
              <table width="100%" cellpadding="0" cellspacing="0">
                <tr>
                  <td style="font-size:11px;color:#8896a8;text-align:left;">
                    0 &#8211; Not at all likely
                  </td>
                  <td style="font-size:11px;color:#8896a8;text-align:right;">
                    10 &#8211; Extremely likely
                  </td>
                </tr>
              </table>
            </td>
          </tr>

        </table>

        <table width="520" cellpadding="0" cellspacing="0">
          <tr>
            <td align="center" style="padding:20px 0 0;
                                      font-size:11px;color:#a0a8b4;line-height:1.6;">
              This survey is a service from __BRAND_NAME__.<br>
              __BRAND_NAME__ &bull; __ADDRESS__
            </td>
          </tr>
        </table>

      </td>
    </tr>
  </table>
</body>
</html>
